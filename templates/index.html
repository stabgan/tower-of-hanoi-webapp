<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tower of Hanoi</title>
  <style>
    canvas {
      width: 100%;
    }
    body {
      margin: 0;
      border: 0;
      padding-top: 5%;
      margin-left: auto;
      margin-right: auto;
      display: block;
      text-align: center;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
    }
    h1 {
      font-family: "Courier New", Courier, monospace;
      font-weight: bolder;
    }
    #sub {
      text-decoration: none;
      font-weight: bold;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
    }
  </style>
</head>
<body>
  <h1>
    {% if discs %}For {{ discs }} disc{{ 's' if discs != 1 }}{% else %}Enter number of discs{% endif %}
  </h1>
  <p>(Be careful about recursion depth — the server may hang)</p>

  <form method="POST">
    {{ form.hidden_tag() }}
    {{ form.num.label }} {{ form.num() }}
    {{ form.submit() }}
  </form>
  <br>

  <label for="slider">Adjust Animation Speed</label>
  <input type="range" id="slider" min="50" max="3000">
  <br><br>

  <canvas id="mycan" height="400"></canvas>

  <p id="sub">
    By <a href="https://linkedin.com/in/stabgan">Kaustabh Ganguly</a> &copy; 2019
  </p>

<script>
  /* ---- data injected from Flask (safe JSON, no eval) ---- */
  const totalSteps = {{ count | tojson }};
  const discCount  = {{ discs | tojson }};
  const moveList   = {{ seq  | tojson }};

  /* ---- canvas setup ---- */
  const canvas = document.getElementById("mycan");
  const ctx    = canvas.getContext("2d");
  canvas.width = window.innerWidth;

  const speed = document.getElementById("slider");
  speed.defaultValue = 2550;

  let counter = -1;

  const BLOCK_LENGTH = 50;
  const Ax = Math.floor(canvas.width / 2 - 1.5 * BLOCK_LENGTH);
  const Bx = Ax + BLOCK_LENGTH + 10;
  const Cx = Bx + BLOCK_LENGTH + 10;
  const By = 300;
  const Dx = 15;
  const CLEARy = 0;

  /* ---- drawing helpers ---- */
  function drawDisc(x, y, w, h) {
    h = h || Dx;
    ctx.fillStyle = "#FF0000";
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = "black";
    ctx.strokeRect(x, y, w, h);
  }

  function drawDiscs(count, startX, startY, width) {
    startX = (startX !== undefined) ? startX : Ax;
    startY = (startY !== undefined) ? startY : By;
    width  = (width  !== undefined) ? width  : BLOCK_LENGTH;
    for (let t = 0; t < count; t++) {
      drawDisc(startX, startY, width);
      startX += 1;
      startY -= 15;
      width  -= 2;
    }
  }

  function clear(peg) {
    if (peg === 1) ctx.clearRect(Ax, CLEARy, BLOCK_LENGTH, canvas.height);
    if (peg === 2) ctx.clearRect(Bx, CLEARy, BLOCK_LENGTH, canvas.height);
    if (peg === 3) ctx.clearRect(Cx, CLEARy, BLOCK_LENGTH, canvas.height);
  }

  /* ---- initial draw ---- */
  ctx.font = "40px Arial";
  ctx.fillText(totalSteps + " Steps", canvas.width / 10, canvas.height / 2 - 20);

  let A = discCount;
  let B = 0;
  let C = 0;
  drawDiscs(A);

  /* ---- animation loop ---- */
  function anim(i) {
    i = i || 0;
    const list = [[0, 0]].concat(moveList);   /* prepend initial state */

    if (i >= list.length) return;

    counter += 1;
    ctx.clearRect(0.6 * canvas.width, 0, 500, 500);
    ctx.fillText("Count:" + counter, 7 * canvas.width / 10, canvas.height / 2 - 20);

    const ini = list[i][0];
    const fin = list[i][1];

    if (ini === 0 && fin === 0) {
      clear(1); clear(2); clear(3);
      drawDiscs(A);
    }
    if (ini === 1 && fin === 2) {
      clear(1); A -= 1; drawDiscs(A);
      clear(2); B += 1; drawDiscs(B, Bx);
    }
    if (ini === 2 && fin === 1) {
      clear(2); B -= 1; drawDiscs(B, Bx);
      clear(1); A += 1; drawDiscs(A);
    }
    if (ini === 1 && fin === 3) {
      clear(1); A -= 1; drawDiscs(A);
      clear(3); C += 1; drawDiscs(C, Cx);
    }
    if (ini === 3 && fin === 1) {
      clear(3); C -= 1; drawDiscs(C, Cx);
      clear(1); A += 1; drawDiscs(A);
    }
    if (ini === 2 && fin === 3) {
      clear(2); B -= 1; drawDiscs(B, Bx);
      clear(3); C += 1; drawDiscs(C, Cx);
    }
    if (ini === 3 && fin === 2) {
      clear(3); C -= 1; drawDiscs(C, Cx);
      clear(2); B += 1; drawDiscs(B, Bx);
    }

    i++;
    setTimeout(function () { anim(i); }, 3050 - speed.value);
  }

  anim();
</script>
</body>
</html>
